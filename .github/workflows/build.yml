name: Build Plugins

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  BUILD_TYPE: Release

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            cmake_args: >-
              -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
              -DTAILWIND_FORMATS="VST3 AU Standalone"
            artifact_name: Tailwind-macOS
            artifact_paths: |
              build/Tailwind_artefacts/Release/VST3
              build/Tailwind_artefacts/Release/AU
              build/Tailwind_artefacts/Release/Standalone

          - name: Windows
            os: windows-latest
            cmake_args: >-
              -DTAILWIND_FORMATS="VST3 Standalone"
            artifact_name: Tailwind-Windows
            artifact_paths: |
              build/Tailwind_artefacts/Release/VST3
              build/Tailwind_artefacts/Release/Standalone

          - name: Linux
            os: ubuntu-latest
            cmake_args: >-
              -DTAILWIND_FORMATS="VST3 Standalone"
            artifact_name: Tailwind-Linux
            artifact_paths: |
              build/Tailwind_artefacts/Release/VST3
              build/Tailwind_artefacts/Release/Standalone

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # Linux needs ALSA, X11, GL, and other deps for JUCE
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libx11-dev \
            libxcomposite-dev \
            libxcursor-dev \
            libxext-dev \
            libxinerama-dev \
            libxrandr-dev \
            libxrender-dev \
            libfreetype6-dev \
            libglu1-mesa-dev \
            mesa-common-dev \
            libcurl4-openssl-dev \
            libwebkit2gtk-4.1-dev

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
            -DTAILWIND_COPY_AFTER_BUILD=OFF \
            -DTAILWIND_USE_MARCH_NATIVE=OFF \
            -DTAILWIND_ENABLE_CODEGEN=OFF \
            ${{ matrix.cmake_args }}

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: |
          cmake -B build `
            -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} `
            -DTAILWIND_COPY_AFTER_BUILD=OFF `
            -DTAILWIND_USE_MARCH_NATIVE=OFF `
            -DTAILWIND_ENABLE_CODEGEN=OFF `
            ${{ matrix.cmake_args }}

      - name: Build
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}

  # Create a GitHub Release with all artifacts when a tag is pushed
  release:
    name: Create Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Package artifacts
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            zip -r "../${name}.zip" "$dir"
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: "*.zip"
